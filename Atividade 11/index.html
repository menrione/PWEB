<body>
    <script>
    //1.

    //4. 
        function Aluno(ra, nome) {
            this.ra = ra;
            this.nome = nome;
            this.MostraDados = function() {
                return "ra=" + this.ra + " nome=" + this.nome;
            }
        }

        var aluno4 = new Aluno("004", "Carla");
        alert(aluno4.MostraDados());
        //alert(aluno4.nome);

    //5.
        function Aluno2() {
            var ra;
            var nome;

            this.setRa = function(value) {
                this.ra = value;
            }

            this.getRa = function() {
                return this.ra;
            }

            this.setNome = function(value) {
                this.nome = value;
            }

            this.getNome = function() {
                return this.nome;
            }
        }

        var aluno5 = new Aluno2();
        aluno5.setRa("005");
        aluno5.setNome("Ariel");
        alert("ra=" + aluno5.getRa() + " nome=" + aluno5.getNome());

    //6. herança
        function AlunoADS() {
            var numLab;
            this.setNumLab = function(value) {
                this.numLab = value;
            }

            this.getNumLab = function() {
                return this.numLab;
            }
        }

        AlunoADS.prototype = new Aluno2();
        var aluno6 = new AlunoADS();

        aluno6.setRa("006");
        aluno6.setNome("Marcos");
        aluno6.setNumLab(5);
        alert("ra=" + aluno6.getRa() + " nome=" + aluno6.getNome() 
              + " lab=" + aluno6.getNumLab());

    //7. classe
        class Aluno1 {
            constructor() {
                this._ra;
                this._nome;
            }

            setNome(value) {
                this._nome = value;
            }

            getNome() {
                return this._nome;
            }

            setRa(value) {
                this._ra = value;
            }

            getRa() {
                return this._ra;
            }
        }

        var objAluno = new Aluno1();
        objAluno.setRa("007");
        objAluno.setNome("Carol");
        alert(`ra=${objAluno.getRa()} nome=${objAluno.getNome()}`);

        
    //8. herança entre classes
        class AlunoADS1 extends Aluno1 {
            constructor() {
                super();
                this._numLab;
            }

            setNumLab(value) {
                this._numLab = value;
            }

            getNumLab() {
                return this._numLab;
            }
        }

        var objAlunoADS1 = new AlunoADS1();
        objAlunoADS1.setRa("008");
        objAlunoADS1.setNome("Dante");
        objAlunoADS1.setNumLab(8);
        alert(`ra=${objAlunoADS1.getRa()} nome=${objAlunoADS1.getNome()} lab=${objAlunoADS1.getNumLab()}`);

    // 9.1 copiar um objeto para outro
        var obj1 = new Object();
        var obj2 = obj1;
        obj1.nome = "Denilce";
        alert(obj2.nome);

    // 9.2 métodos e atributos - público e privado
        class ContaBancaria {
            #cpf; // atributo privado

            constructor(nome, saldoInicial) {
                this.nome = nome; // atributo público
                this.saldo = saldoInicial;
            }

            setCpf(value) {
                this.cpf = value;
            }

            getCpf() {
                return this.cpf;
            }

            getSaldo() {
                return this.saldo
            }

            getNome() {
                return this.nome;
            }

            depositar(valor) { // método público
                this.saldo += valor;
                this.#registrarTransacao(valor);
            }

            #registrarTransacao(valor) { // método privado
                console.log(`Depósito de R$ ${valor} realizado pelo ${this.nome} e saldo R$ ${this.saldo} para cpf ${this.getCpf()} ou ${this.#cpf}`);
            }
        }

        const conta = new ContaBancaria("Diana", 1000);
        conta.setCpf(123);
        conta.depositar(500);

    //9.3 chave-valor
        const arr = [
            ['codigo', 1],

        ];

        alert(obj);
        alert(obj.nome);
        alert(JSON.stringify(obj));

    //10.2

            empresa: 'ZF do Brasil'
        };

        };

        }, objNovaEmpresa, objVeiculo);

        console.log(motorista);
    </script>
